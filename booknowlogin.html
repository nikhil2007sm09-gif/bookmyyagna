<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book My Yagna - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* --- Existing Styles --- */
body {
    margin: 0; padding: 0;
    font-family: 'Poppins', sans-serif;
    /* Using a symbolic image to represent Yagna/Pooja environment */
    background: url('https://images.pexels.com/photos/3822622/pexels-photo-3822622.jpeg') center/cover no-repeat fixed;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
}
.login-container {
    background: rgba(255,255,255,0.98); /* Slightly more opaque */
    padding: 40px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); /* Stronger shadow */
    width: 100%;
    max-width: 400px;
    text-align: center;
}
.login-container h2 {
    color: #cc6200; /* Darker orange for better contrast */
    margin-bottom: 25px;
    font-weight: 700;
}
.login-container input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    box-sizing: border-box; /* Ensures padding doesn't affect total width */
}
.login-container button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg,#ff7a00,#ffb100);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
    font-weight: 600;
}
.login-container button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(255,136,0,0.4);
}
.login-container a {
    display: block;
    margin-top: 15px;
    color: #cc6200;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
}
.login-container a:hover {
    color: #ff9800;
}
/* --- New Google Button Style --- */
.google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #4285f4; /* Google Blue */
    color: white;
    margin-top: 20px;
    padding: 10px 12px;
    border-radius: 10px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.3s;
}
.google-btn:hover {
    background-color: #357ae8; /* Darker blue on hover */
    transform: none; /* Override general button hover effect */
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.google-icon {
    width: 20px;
    height: 20px;
    margin-right: 10px;
    background-color: white;
    padding: 4px;
    border-radius: 2px;
}
.separator {
    margin: 20px 0;
    color: #aaa;
    position: relative;
}
.separator::before, .separator::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: #ccc;
}
.separator::before {
    left: 0;
}
.separator::after {
    right: 0;
}
</style>
</head>
<body>
<div class="login-container" id="loginForm">
    <h2>🕉 Login to Book My Yagna</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="standardLogin()">Login & Book Now</button>
    
    <div class="separator">OR</div>

    <div class="google-btn" onclick="googleLogin()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/768px-Google_%22G%22_logo.svg.png" alt="Google icon" class="google-icon">
        Continue with Google
    </div>

    <a href="#" onclick="showCreateAccountForm(); return false;">Create Account</a>
    <a href="#">Forgot Password?</a>
</div>

<div class="login-container" id="createAccountForm" style="display:none;">
    <h2>📝 Create Your Yagna Account</h2>
    <input type="text" id="newUsername" placeholder="Full Name" required>
    <input type="email" id="newEmail" placeholder="Email" required>
    <input type="password" id="newPassword" placeholder="Create Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <button onclick="createAccount()">Create Account</button>
    <a href="#" onclick="showLoginForm(); return false;">Back to Login</a>
</div>

<script>
const BOOKING_PAGE = 'booknow.html';
const LOGIN_PAGE = 'booknowlogin.html'; // Current page

// Function to handle standard email/password login
function standardLogin(){
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Simplified Mock Logic: If both fields are filled, "login" is successful.
    if(email && password){
        alert('✅ Standard Login Successful! Redirecting to Dashboard...');
        window.location.href = BOOKING_PAGE;
    } else {
        alert('❌ Please enter both email and password!');
    }
}

// Function to handle mock Google login
function googleLogin() {
    // In a real application, this would trigger the Google API popup (gapi.auth2.getAuthInstance().signIn())
    alert('✨ Redirecting to Google for Sign-In... (Mock Successful)');
    
    // Simulate successful redirect after Google authorization
    setTimeout(() => {
        window.location.href = BOOKING_PAGE;
    }, 500);
}

// Function to handle account creation
function createAccount() {
    const name = document.getElementById('newUsername').value.trim();
    const email = document.getElementById('newEmail').value.trim();
    const password = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!name || !email || !password || !confirm) {
        alert('❌ Please fill in all fields to create an account.');
        return;
    }

    if (password !== confirm) {
        alert('❌ Passwords do not match. Please re-enter.');
        return;
    }

    // Mock Backend Call: If logic passes, simulate success.
    alert(`🎉 Account for ${name} created successfully! Please log in now.`);
    showLoginForm(); // Redirect back to the login form
}


// --- Form Visibility Toggles ---
function showCreateAccountForm() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('createAccountForm').style.display = 'block';
}

function showLoginForm() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('createAccountForm').style.display = 'none';
}

document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const response = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
    });

    const data = await response.json();

    if (response.ok) {
        localStorage.setItem('loggedUser', data.username);
        localStorage.setItem('token', data.token);
        window.location.href = 'panditdashboard.html';
    } else {
        alert(data.message);
    }
});

</script>
</body>
</html>
